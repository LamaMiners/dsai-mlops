<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phishing Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow mx-auto" style="max-width: 700px;">
            <div class="card-header bg-primary text-white">
                <h2 class="mb-0">Phishing Email Detector</h2>
            </div>
            <div class="card-body">
                <form id="predict-form">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Total Words</label>
                            <input type="number" id="num_words" class="form-control" value="100">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Unique Words</label>
                            <input type="number" id="num_unique_words" class="form-control" value="80">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Stopwords Count</label>
                            <input type="number" id="num_stopwords" class="form-control" value="30">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Number of Links</label>
                            <input type="number" id="num_links" class="form-control" value="2">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Unique Domains</label>
                            <input type="number" id="num_unique_domains" class="form-control" value="1">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email Addresses in Text</label>
                            <input type="number" id="num_email_addresses" class="form-control" value="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Spelling Errors</label>
                            <input type="number" id="num_spelling_errors" class="form-control" value="1">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Urgent Keywords</label>
                            <input type="number" id="num_urgent_keywords" class="form-control" value="0">
                        </div>
                    </div>
                    <button type="button" class="btn btn-primary w-100 mt-4" onclick="predict()">Check for Phishing</button>
                </form>
                <div id="result" class="mt-4 h4 text-center"></div>
            </div>
        </div>
    </div>
    <script src="predict.js"></script>
</body>
</html>
